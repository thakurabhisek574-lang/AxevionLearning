<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Us - Smart Study For Toppers</title>
    <style>
        /* Overflow hidden taaki page side mein na hile */
        html, body { 
            background: #0a141e; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            width: 100%;
            overflow-x: hidden; /* Sabse important line */
        }

        body {
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        .nav-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            box-sizing: border-box;
            border-bottom: 2px solid #00f7ff;
            background: #0a141e;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            border: 2px solid #00f7ff;
            background: transparent;
            color: #00f7ff;
            padding: 6px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .header-title {
            color: #ffcc00;
            font-weight: bold;
            font-size: 12px;
            text-align: right;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* Form Container - Width fix for mobile */
        .contact-container { 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid #00f7ff; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.2); 
            max-width: 350px; 
            width: 85%; /* Thoda kam kiya taaki margin mile */
            margin: 30px auto;
            box-sizing: border-box;
        }

        h1 { 
            color: #00f7ff; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: 0;
            font-size: 22px;
        }

        p { text-align: center; color: #ccc; font-size: 13px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; width: 100%; }
        label { display: block; margin-bottom: 5px; color: #ff00c8; font-weight: bold; font-size: 13px; }
        
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        input:focus, textarea:focus { border-color: #00f7ff; }
        
        button { 
            width: 100%; 
            padding: 12px; 
            border-radius: 50px; 
            border: none; 
            background: linear-gradient(45deg, #00f7ff, #002bff); 
            color: #fff; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="phy-chapters.html" class="back-btn">BACK</a>
        <div class="header-title">SMART STUDY<br>FOR TOPPERS</div>
    </div>

    <div class="contact-container">
        <h1>CONTACT US</h1>
        <p>Physics ka koi doubt ho, humein message karein!</p>
        
        <form action="https://formsubmit.co/abhisekthakur996@gmail.com" method="POST">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" name="name" placeholder="Apna naam" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Apna email" required>
            </div>
            
            <div class="form-group">
                <label>Your Message</label>
                <textarea name="message" rows="4" placeholder="Kya help chahiye?" required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>

</body>
</html>
